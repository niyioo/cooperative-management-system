version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: bravedge_db
    restart: always
    environment:
      POSTGRES_DB: cooperative_db
      POSTGRES_USER: coop_user
      POSTGRES_PASSWORD: Coop@12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # ✅ ADDED: Healthcheck so the backend knows when it's safe to connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coop_user -d cooperative_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  # 2. Django Backend
  backend:
    build: ./backend
    container_name: bravedge_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DB_NAME=cooperative_db
      - DB_USER=coop_user
      - DB_PASSWORD=Coop@12345
      - DB_HOST=db
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGIN=http://localhost:5173
    depends_on:
      # ✅ ADDED: Tell the backend to wait for the db healthcheck to pass
      db:
        condition: service_healthy

  # 3. React Frontend
  frontend:
    build: ./frontend
    container_name: bravedge_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data: